services: 
  postgres:
    container_name: postgres
    image: "postgres:16-alpine"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mlflowdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - effective_cache_size=64MB
      - -c
      - max_connections=10
      - -c
      - wal_buffers=1MB
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  mlflow:
    build:
      context: ./mlflow
    container_name: mlflow
    ports: 
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./artifacts:/mlflow/artifacts
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mlflowdb
    command: >
      mlflow server 
      --backend-store-uri $$DATABASE_URL
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --workers 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data: