name: MLOps CICD
on:
  workflow_dispatch: 
  push:
    branches: 
      - main
jobs: 

  deploy-model:
    runs-on: ubuntu-latest
    # Global fix for the OCI chunked encoding error
    env:
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 
        uses: actions/setup-python@v6
        with:
            python-version: '3.12' 
            cache: pip # Cache the pip requirments
      
      - name: Install dependencies
        run: |
           pip3 install -r requirements.txt
    
      - name: Pull the data from OCI object storage
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
        run: |
            dvc pull

      - name: Run DVC pipelines
        run: |
            dvc repro --force
    
      - name: Push the DVC-tracked data to OCI Object storage
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
        run: |
           dvc push 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock 
          
          # Only commit and push if there are actual changes to prevent workflow crashes
          if ! git diff-index --quiet HEAD; then
            git commit -m "automated commit of DVC outputs and updated code [skip ci]"
            git push origin main
          else
            echo "No changes detected. Skipping push."
          fi

      - name: Promote model to production
        if: success()
        run: python src/promote_model.py
            
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
        
      - name: Path filtering for docker files 
        uses: dorny/paths-filter@v3
        id: changes
        with: 
          filters: |
            backend:
              - 'backend/**'
            frontend: 
              - 'frontend/**'
            compose: 
              - 'docker-compose.yml' 
           
      - name: Build and push backend image
        if: steps.changes.outputs.backend == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cricket-score-backend:latest
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket-score-backend:latest backend

      - name: Build and push frontend images
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket-score-frontend:latest frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/cricket-score-frontend:latest

      - name: Copy docker-compose.yml
        if: steps.changes.outputs.compose == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_TOKEN }}
          source: docker-compose.yml
          target: ~/cricket-app

      - name: SSH into Oracle VM
        if: steps.changes.outputs.compose == 'true' || steps.changes.outputs.frontend == 'true' || steps.changes.outcome.backend == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_TOKEN }}
          script: |
            cd ~/cricket-app
            docker compose pull
            docker compose up -d 

