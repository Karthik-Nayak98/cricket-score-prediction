name: MLOps CICD
on:
  workflow_dispatch:
jobs: 

  deploy-model:
    runs-on: ubuntu-latest
    # Global fix for the OCI chunked encoding error
    env:
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Debug
        run: |
          pwd
          ls -la
          find . -name "requirements.txt"

      - name: Setup Python 
        uses: actions/setup-python@v6
        with:
            python-version: '3.12' 
            cache: pip # Cache the pip requirments
      
      - name: Install dependencies
        run: |
           pip3 install -r requirements.txt
    
      - name: Pull the data from OCI object storage
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
        run: |
            dvc pull

      - name: Run DVC pipelines
        run: |
            dvc repro
    
      - name: Push the DVC-tracked data to OCI Object storage
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
        run: |
           dvc push 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Only commit and push if there are actual changes to prevent workflow crashes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated commit of DVC outputs and updated code" || echo "No changes to commit"
            git push origin main
          else
            echo "No changes detected. Skipping push."
          fi

      - name: Promote model to production
        if: success()
        run: python scripts/promote_model.py
            
      # - name: SSH into Oracle VM #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USERNAME }}
      #     key: ${{ secrets.SSH_TOKEN }}
      #     script: |
      #       whoami
      #       hostname
      #       pwd
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket-score-frontend:latest frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket-score-backend:latest backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket-score-mlflow:latest mlflow

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cricket-score-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cricket-score-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cricket-score-mlflow:latest
