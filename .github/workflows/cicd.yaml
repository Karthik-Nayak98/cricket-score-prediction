name: MLOps CICD
on: 
  push: 
    branches: 'master'
jobs: 
  deploy-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 
        uses: actions/setup-python@v6
        with:
            python-version: '3.12' 
            cache: pip # Cache the pip requirments
      
      - name: Install dependencies
        run: |
           pip3 install -r requirements.txt
    
      - name: Run DVC pipelines
        run: |
            dvc repro
    
      - name: Push the DVC-tracked data to remote
        env: 
            CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }} 
            CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
           dvc push 

      - name: Promote model to production
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python scripts/promote_model.py
            
  serve_model:
    runs-on: ubuntu-latest
    steps:
        - name: SSH into Oracle VM
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_TOKEN }}
            script: |
              whoami
              hostname
              pwd
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }} 

        - name: Build images
          run: |
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-frontend:latest ./frontend
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-backend:latest ./backend
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-mlflow:latest ./mlflow

        - name: Push images
          run: |
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-frontend:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-backend:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-score-mlflow:latest