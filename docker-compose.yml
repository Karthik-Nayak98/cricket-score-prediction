services
  backend:
    build:
      context: ./backend
    container_name: backend
    depends_on: 
      - postgres
      - mlflow
    ports:
      - "8000:8000"
    environment: 
      MLFLOW_TRACKING_URI: "http://mlflow:5000"

  frontend:
    build: 
      context: ./frontend
    container_name: frontend
    depends_on:
       - backend
    ports:
      - "8501:8501"
    environment: 
      BACKEND_URI: 'http://backend:8000'